<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css">
    <title>Tic Tac Toe</title>
</head>
<body>
    <header>
        <div>
            <h1>Tic Tac Toe</h1>
        </div>
    </header>
    <main>
        <div id="gameboard">
            <div id="board">
                <div class="box" id="box1"></div>
                <div class="box" id="box2"></div>
                <div class="box" id="box3"></div>
                <div class="box" id="box4"></div>
                <div class="box" id="box5"></div>
                <div class="box" id="box6"></div>
                <div class="box" id="box7"></div>
                <div class="box" id="box8"></div>
                <div class="box" id="box9"></div>
            </div>
            <div id="btn-container">
                <button id="resetbtn">RESET</button>
            </div>
        </div>

        <div id="overlay">
            <div id="overlayContent" class="popUp">
                <p class="announcement">YOU WIN</p>
            </div>
        </div>
    </main>
    <footer>
        Made by XNOXtm❤️
    </footer>
</body>
</html>
